<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Athlynk — Coach e atleta, in connessione continua</title>
  <meta name="description" content="Athlynk è la piattaforma per coach e atleti. Allenamento, nutrizione, monitoraggio e continuità del percorso, in un unico ecosistema digitale." />

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />

  <link rel="stylesheet" href="styles.css" />

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
      <rect width="200" height="200" fill="#f4efe4"/>
      <g transform="translate(100,100)" stroke="#14110d" stroke-width="2.4" fill="none">
        <path d="M0 -50 L43.3 -25 L43.3 25 L0 50 L-43.3 25 L-43.3 -25 Z"/>
        <path d="M0 -32 L18 24 M0 -32 L-18 24 M-10 8 H10"/>
      </g>
    </svg>
  </template>

  <script type="application/json" id="speaker-notes">[]</script>

  <style>
    /* Splash while babel boots */
    #boot {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      background: #f4efe4;
      z-index: 9999;
      transition: opacity 0.5s ease;
      font-family: 'Bodoni Moda', serif;
    }
    #boot.gone { opacity: 0; pointer-events: none; }
    #boot .mark { width: 64px; height: 64px; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="boot">
    <svg class="mark" viewBox="0 0 32 32" fill="none">
      <path d="M16 1.5 L29 9 L29 23 L16 30.5 L3 23 L3 9 Z" stroke="#14110d" stroke-width="0.8" />
      <path d="M16 7 L22 23 M16 7 L10 23 M12.5 18 H19.5" stroke="#14110d" stroke-width="1.1" />
    </svg>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="components/marks.jsx"></script>
  <script type="text/babel" src="components/shell.jsx"></script>
  <script type="text/babel" src="pages/page-landing.jsx"></script>
  <script type="text/babel" src="pages/page-about.jsx"></script>
  <script type="text/babel" src="pages/page-services.jsx"></script>
  <script type="text/babel" src="pages/page-pricing.jsx"></script>
  <script type="text/babel" src="pages/page-faq.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // hide splash once react is up
    const checkBoot = () => {
      if (document.querySelector('#root .page, #root nav')) {
        const b = document.getElementById('boot');
        if (b) { b.classList.add('gone'); setTimeout(() => b.remove(), 600); }
      } else {
        setTimeout(checkBoot, 80);
      }
    };
    setTimeout(checkBoot, 200);
  </script>
</body>
</html>
