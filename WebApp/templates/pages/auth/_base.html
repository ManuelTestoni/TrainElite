{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athlynk | {% block auth_title %}Accesso{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link rel="stylesheet" href="{% static 'css/athlynk.css' %}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ink:'#14110d','ink-soft':'#2a2620','ink-mute':'#5b554a','ink-line':'#8a8270',
                        parchment:'#f4efe4', marble:'#ece5d6','marble-warm':'#e7dfcb', stone:'#d8cfba','stone-deep':'#c4b89c',
                        aegean:'#1c4a52','aegean-deep':'#0e2f36',
                        bronze:'#8a6a3a','bronze-soft':'#a78554','bronze-light':'#c8a774',
                        primary:'#14110d', accent:'#1c4a52', surface:'#f4efe4', brand:'#8a6a3a',
                    },
                    fontFamily: {
                        display: ['"Bodoni Moda"', 'Didot', 'serif'],
                        sans: ['Inter','system-ui','sans-serif'],
                        mono: ['"JetBrains Mono"','ui-monospace','monospace'],
                    },
                }
            }
        }
    </script>

    <style>
      /* Auth-only background: marble + columns silhouette */
      .auth-stage {
        position: relative;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
        background: var(--al-parchment);
        background-image:
          radial-gradient(ellipse 100% 60% at 50% -20%, rgba(255,255,255,0.7), transparent 60%),
          radial-gradient(ellipse 80% 60% at 100% 110%, rgba(28,74,82,0.06), transparent 60%),
          radial-gradient(ellipse 60% 40% at 0% 110%, rgba(138,106,58,0.06), transparent 60%);
      }

      /* Decorative columns silhouette behind the panel (md+) */
      .auth-columns {
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: clamp(8px, 1.5vw, 24px);
        padding: 0 clamp(20px, 4vw, 56px);
        pointer-events: none;
        opacity: 0.18;
      }
      .auth-columns .col {
        align-self: end;
        height: 70%;
        background:
          repeating-linear-gradient(
            90deg,
            #ece5d6 0 11px,
            rgba(20,17,13,0.08) 11px 12px,
            #e7dfcb 12px 22px,
            rgba(20,17,13,0.05) 22px 23px
          );
        border-top: 4px solid #d8cfba;
        border-bottom: 4px solid #d8cfba;
      }
      @media (max-width: 880px) { .auth-columns { display: none; } }

      .auth-meander {
        height: 12px;
        background-color: var(--al-bronze);
        opacity: 0.55;
        -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 14'><path fill='black' d='M0 12 L0 2 L10 2 L10 8 L4 8 L4 12 Z M14 12 L14 2 L24 2 L24 8 L18 8 L18 12 Z M28 12 L28 2 L38 2 L38 8 L32 8 L32 12 Z M42 12 L42 2 L52 2 L52 8 L46 8 L46 12 Z'/></svg>") repeat-x;
                mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 56 14'><path fill='black' d='M0 12 L0 2 L10 2 L10 8 L4 8 L4 12 Z M14 12 L14 2 L24 2 L24 8 L18 8 L18 12 Z M28 12 L28 2 L38 2 L38 8 L32 8 L32 12 Z M42 12 L42 2 L52 2 L52 8 L46 8 L46 12 Z'/></svg>") repeat-x;
        -webkit-mask-size: 14px 14px;
                mask-size: 14px 14px;
      }

      .auth-panel {
        position: relative;
        background: var(--al-parchment);
        border: 1px solid var(--al-rule-strong);
        box-shadow: var(--al-shadow-3);
        z-index: 2;
      }
      .auth-panel::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--al-bronze), transparent);
      }

      .auth-mark { width: 38px; height: 38px; }

      /* Role tile */
      .auth-tile {
        padding: 16px;
        background: var(--al-marble);
        border: 1px solid var(--al-rule);
        cursor: pointer;
        transition: border-color var(--al-d-base) var(--al-ease),
                    background var(--al-d-base) var(--al-ease),
                    transform var(--al-d-base) var(--al-ease-out);
        display: flex; flex-direction: column; align-items: center; gap: 8px;
        text-align: center;
        border-radius: var(--al-r-sm);
      }
      .auth-tile:hover { border-color: var(--al-bronze-s); transform: translateY(-2px); }
      .auth-tile.is-on { border-color: var(--al-bronze); background: var(--al-marble-warm); box-shadow: 0 0 0 2px rgba(138,106,58,0.3); }

      .auth-tile-row {
        padding: 12px 14px;
        background: var(--al-marble);
        border: 1px solid var(--al-rule);
        display: flex; align-items: center; gap: 12px;
        border-radius: var(--al-r-sm);
        cursor: pointer;
        transition: border-color var(--al-d-base) var(--al-ease), background var(--al-d-base) var(--al-ease);
      }
      .auth-tile-row:hover { border-color: var(--al-bronze-s); }
      .auth-tile-row.is-on { border-color: var(--al-bronze); background: var(--al-marble-warm); box-shadow: 0 0 0 2px rgba(138,106,58,0.25); }

      .auth-tile-icon {
        width: 40px; height: 40px;
        display: inline-flex; align-items: center; justify-content: center;
        background: var(--al-stone); color: var(--al-ink-soft);
        border-radius: var(--al-r-sm);
        font-size: 18px;
        flex-shrink: 0;
      }
      .auth-tile.is-on .auth-tile-icon,
      .auth-tile-row.is-on .auth-tile-icon { background: var(--al-bronze); color: var(--al-parchment); }
    </style>
    {% block auth_extra_head %}{% endblock %}
</head>
<body class="font-sans text-ink">
    <div class="auth-stage">
        <!-- Decorative columns silhouette -->
        <div class="auth-columns" aria-hidden="true">
            <div class="col" style="height: 64%"></div>
            <div class="col" style="height: 71%"></div>
            <div class="col" style="height: 68%"></div>
            <div class="col" style="height: 76%"></div>
            <div class="col" style="height: 70%"></div>
            <div class="col" style="height: 66%"></div>
            <div class="col" style="height: 73%"></div>
        </div>

        <main class="relative z-10 flex items-center justify-center px-4 py-10 sm:py-16">
            <div class="w-full {% block auth_panel_width %}max-w-md{% endblock %}">

                <!-- Brand mark -->
                <div class="flex flex-col items-center mb-8">
                    <a href="/" class="inline-flex items-center gap-3">
                        <svg class="auth-mark" viewBox="0 0 32 32" fill="none">
                            <path d="M16 1.5 L29 9 L29 23 L16 30.5 L3 23 L3 9 Z" stroke="#14110d" stroke-width="1"/>
                            <path d="M16 7 L22 23 M16 7 L10 23 M12.5 18 H19.5" stroke="#14110d" stroke-width="1.4"/>
                        </svg>
                        <span class="al-display" style="font-size: 28px;">Athlynk</span>
                    </a>
                    <p class="al-tag mt-3">{% block auth_eyebrow %}Coach &amp; Atleta{% endblock %}</p>
                </div>

                <!-- Panel -->
                <div class="auth-panel px-7 sm:px-10 py-10">
                    {% block auth_content %}{% endblock %}
                </div>

                <!-- Footer link -->
                <p class="text-center mt-6 al-small">
                    {% block auth_foot %}{% endblock %}
                </p>

                <!-- Bronze meander accent -->
                <div class="auth-meander mt-8 mx-auto" style="width: 84px;"></div>
            </div>
        </main>
    </div>
</body>
</html>
