<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrati - TrainElite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen py-10 flex px-4">
    <div class="max-w-xl w-full mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden my-auto" x-data="{ role: 'CLIENT' }">
        <div class="px-8 py-10">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-900">Crea un account</h1>
                <p class="text-sm text-slate-500 mt-2">Scegli il tuo ruolo e inizia</p>
            </div>
            
            {% if error %}
            <div class="mb-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm flex items-center gap-2">
                <i class="ph-fill ph-warning-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form action="{% url 'signup' %}" method="POST" class="space-y-5">
                {% csrf_token %}
                
                <!-- Ruolo Selector -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="CLIENT" x-model="role" class="sr-only">
                        <div :class="role === 'CLIENT' ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-600 ring-offset-2 ring-offset-white' : 'border-slate-200 hover:border-indigo-300'" class="p-4 rounded-xl border-2 transition-all text-center flex flex-col items-center gap-2">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl" :class="role === 'CLIENT' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-500'">
                                <i class="ph-fill ph-user"></i>
                            </div>
                            <span class="font-semibold" :class="role === 'CLIENT' ? 'text-indigo-900' : 'text-slate-700'">Cliente</span>
                        </div>
                    </label>

                    <label class="cursor-pointer">
                        <input type="radio" name="role" value="COACH" x-model="role" class="sr-only">
                        <div :class="role === 'COACH' ? 'border-indigo-600 bg-indigo-50 ring-2 ring-indigo-600 ring-offset-2 ring-offset-white' : 'border-slate-200 hover:border-indigo-300'" class="p-4 rounded-xl border-2 transition-all text-center flex flex-col items-center gap-2">
                            <div class="w-12 h-12 rounded-full flex items-center justify-center text-xl" :class="role === 'COACH' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-500'">
                                <i class="ph-fill ph-barbell"></i>
                            </div>
                            <span class="font-semibold" :class="role === 'COACH' ? 'text-indigo-900' : 'text-slate-700'">Coach</span>
                        </div>
                    </label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                        <input type="text" name="first_name" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="Mario">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Cognome</label>
                        <input type="text" name="last_name" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="Rossi">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" name="email" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="tu@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none" placeholder="••••••••" minlength="8">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-sm text-lg">
                        Registrati
                    </button>
                </div>
            </form>

            <p class="text-center text-sm text-slate-500 mt-8">
                Hai già un account? <a href="{% url 'login' %}" class="text-indigo-600 font-medium hover:text-indigo-700">Accedi</a>
            </p>
        </div>
    </div>
</body>
</html>
