{% extends 'base.html' %}

{% block content %}
<div class="w-full max-w-lg mx-auto flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="w-20 h-20 rounded-full bg-amber-50 border border-amber-200 flex items-center justify-center mx-auto mb-6">
        <i class="ph ph-stethoscope text-4xl text-amber-500"></i>
    </div>
    <h1 class="text-2xl font-bold text-slate-900 mb-3">Prima visita non ancora effettuata</h1>
    <p class="text-slate-500 text-sm leading-relaxed mb-8">
        Non ti sei ancora sottoposto alla tua prima visita.<br>
        Contatta il tuo specialista per fartela fissare in agenda.
    </p>
    <div class="flex flex-col sm:flex-row items-center gap-3">
        <a href="{% url 'agenda_dashboard' %}"
           class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-slate-900 text-white text-sm font-semibold hover:bg-slate-800 transition-colors shadow-sm">
            <i class="ph ph-calendar-blank"></i> Vai all'agenda
        </a>
        {% if has_coach %}
        <a href="{% url 'client_my_coach' %}"
           class="inline-flex items-center gap-2 px-5 py-3 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm font-semibold hover:bg-slate-50 transition-colors">
            <i class="ph ph-user-circle"></i> Contatta il tuo coach
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
