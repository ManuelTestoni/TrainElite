{% extends 'base.html' %}

{% block title %}Scheda Allenamento{% endblock %}

{% block content %}
{% if edit_mode %}
<script>
window.WORKOUT_DATA = {{ plan_data|safe }};
window.WORKOUT_EDIT_URL = "{% url 'allenamenti_edit' assignment_id %}";
</script>
{% endif %}

<div class="max-w-3xl mx-auto" x-data="workoutBuilder">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8 gap-4">
    <div class="flex items-center gap-3">
      <a href="{% url 'allenamenti_list' %}" class="al-btn-icon al-btn al-btn-ghost">
        <i class="ph ph-arrow-left"></i>
      </a>
      <div>
        <p class="al-eyebrow mb-1">Studio &middot; Schede</p>
        <h1 class="al-h-2" x-text="editMode ? 'Modifica Scheda' : 'Nuova Scheda'"></h1>
        <p class="al-small mt-1">Componi le giornate e aggiungi esercizi.</p>
      </div>
    </div>
    <button @click="saveWorkout()" :disabled="isSaving" type="button" class="al-btn">
      <i class="ph ph-floppy-disk text-sm"></i>
      <span x-show="!isSaving">Salva</span>
      <span x-show="isSaving">Salvo...</span>
    </button>
  </div>

  <div class="space-y-5">

    <!-- Info base -->
    <div class="al-card space-y-4">
      <div>
        <p class="al-eyebrow" style="color: var(--al-ink-mute);">01</p>
        <h2 class="al-h-3 mt-1">Informazioni scheda</h2>
      </div>

      <div>
        <label class="al-label">Titolo *</label>
        <input type="text" x-model="title" placeholder="Es. Ipertrofia Base 4gg" class="al-input">
      </div>

      <div>
        <label class="al-label">Descrizione / Note</label>
        <textarea x-model="description" rows="2" placeholder="Linee guida generali..." class="al-textarea"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="al-label">Obiettivo</label>
          <select x-model="goal" class="al-select">
            <option>Ipertrofia</option>
            <option>Forza</option>
            <option>Dimagrimento</option>
            <option>Ricondizionamento</option>
            <option>Endurance</option>
          </select>
        </div>
        <div>
          <label class="al-label">Livello atleta</label>
          <select x-model="level" class="al-select">
            <option>Principiante</option>
            <option>Intermedio</option>
            <option>Avanzato</option>
          </select>
        </div>
      </div>

      <!-- Client search -->
      <div>
        <label class="al-label">Assegna al cliente *</label>

        <div x-show="selectedClient" class="flex items-center justify-between px-3 py-2.5"
             style="background: rgba(138,106,58,0.08); border: 1px solid rgba(138,106,58,0.3); border-radius: var(--al-r-sm);">
          <div class="flex items-center gap-3">
            <div class="al-avatar al-avatar-sm al-avatar-sq" style="background: var(--al-bronze);">
              <i class="ph ph-user"></i>
            </div>
            <span class="text-sm font-medium text-ink" x-text="selectedClient ? selectedClient.name : ''"></span>
          </div>
          <button @click="clearClient()" type="button" class="text-ink-line hover:text-danger transition-colors">
            <i class="ph ph-x text-sm"></i>
          </button>
        </div>

        <div x-show="!selectedClient" class="relative">
          <div class="flex items-center gap-2 px-3 py-2.5"
               style="background: var(--al-marble); border: 1px dashed var(--al-rule-strong); border-radius: var(--al-r-sm);">
            <i class="ph ph-magnifying-glass text-ink-line text-sm"></i>
            <input type="text" x-model="clientSearchQuery" @input.debounce.300ms="searchClients()"
                   placeholder="Cerca cliente per nome..."
                   class="flex-1 bg-transparent text-[13px] text-ink-soft placeholder-ink-line focus:outline-none">
          </div>
          <div x-show="clientSearchResults.length > 0" @click.outside="clientSearchResults = []"
               class="absolute left-0 right-0 top-full mt-1 z-20 max-h-48 overflow-y-auto"
               style="background: var(--al-parchment); border: 1px solid var(--al-rule-strong); box-shadow: var(--al-shadow-3);">
            <template x-for="c in clientSearchResults" :key="c.id">
              <button type="button" @click="selectClient(c)"
                      class="w-full text-left px-4 py-2.5 hover:bg-marble transition-colors text-sm font-medium text-ink-soft"
                      style="border-bottom: 1px solid var(--al-rule-faint);"
                      x-text="c.name"></button>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Days -->
    <template x-for="(day, dayIndex) in days" :key="day.id">
      <div class="al-card al-card-flush">

        <!-- Day header -->
        <div class="flex items-center justify-between px-5 py-4"
             style="border-bottom: 1px solid var(--al-rule); background: var(--al-marble-warm);">
          <div class="flex items-center gap-3">
            <div class="al-avatar al-avatar-sm al-avatar-sq" style="background: var(--al-ink); width: 28px; height: 28px;" x-text="dayIndex + 1"></div>
            <input type="text" x-model="day.name" placeholder="Nome giornata"
                   class="bg-transparent font-medium text-ink focus:outline-none placeholder:text-ink-line border-none"
                   style="font-family: var(--al-display); font-size: 18px;">
          </div>
          <button @click="removeDay(dayIndex)" type="button" class="p-1.5 text-ink-line hover:text-danger transition-colors">
            <i class="ph ph-trash text-sm"></i>
          </button>
        </div>

        <!-- Exercise rows -->
        <div>
          <template x-for="(ex, exIndex) in day.exercises" :key="exIndex">
            <div class="px-5 py-3 space-y-2" style="border-bottom: 1px solid var(--al-rule-faint);">
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <p class="text-[13px] font-medium text-ink" x-text="ex.name"></p>
                  <p class="al-tag" style="font-size:9px;" x-text="ex.target"></p>
                </div>
                <button @click="removeExercise(dayIndex, exIndex)" type="button" class="text-ink-line hover:text-danger transition-colors shrink-0">
                  <i class="ph ph-x text-xs"></i>
                </button>
              </div>
              <div class="flex flex-wrap items-end gap-2">
                <div class="text-center">
                  <p class="al-tag mb-1" style="font-size:9px;">Set</p>
                  <input type="text" x-model="ex.sets" class="al-input text-center" style="width: 48px; padding: 6px 4px; font-size: 13px;">
                </div>
                <div class="text-center">
                  <p class="al-tag mb-1" style="font-size:9px;">Reps</p>
                  <input type="text" x-model="ex.reps" class="al-input text-center" style="width: 60px; padding: 6px 4px; font-size: 13px;">
                </div>
                <div class="text-center">
                  <p class="al-tag mb-1" style="font-size:9px;">Rec.</p>
                  <input type="text" x-model="ex.rest" class="al-input text-center" style="width: 60px; padding: 6px 4px; font-size: 13px;">
                </div>
                <div class="text-center flex-1 min-w-[120px]">
                  <p class="al-tag mb-1" style="font-size:9px;">Note</p>
                  <input type="text" x-model="ex.notes" placeholder="Es. presa larga..." class="al-input" style="padding: 6px 10px; font-size: 13px;">
                </div>
              </div>
            </div>
          </template>

          <div x-show="day.exercises.length === 0" class="px-5 py-8 text-center">
            <p class="al-tag">Nessun esercizio. Cercane uno qui sotto.</p>
          </div>
        </div>

        <!-- Exercise search per day -->
        <div class="px-5 py-4" style="border-top: 1px solid var(--al-rule);">
          <div class="relative">
            <div class="flex items-center gap-2 px-3 py-2"
                 style="background: var(--al-marble); border: 1px dashed var(--al-rule-strong); border-radius: var(--al-r-sm);">
              <i class="ph ph-magnifying-glass text-ink-line text-sm"></i>
              <input type="text"
                     x-model="daySearch[day.id].q"
                     @input.debounce.300ms="searchForDay(day.id, daySearch[day.id].q)"
                     placeholder="Cerca esercizio..."
                     class="flex-1 bg-transparent text-[13px] text-ink-soft placeholder:text-ink-line focus:outline-none">
              <span x-show="daySearch[day.id].searching" class="al-tag">...</span>
            </div>
            <div x-show="daySearch[day.id].show && daySearch[day.id].results.length > 0"
                 @click.outside="closeDaySearch(day.id)"
                 class="absolute left-0 right-0 top-full mt-1 z-20 max-h-52 overflow-y-auto"
                 style="background: var(--al-parchment); border: 1px solid var(--al-rule-strong); box-shadow: var(--al-shadow-3);">
              <template x-for="ex in daySearch[day.id].results" :key="ex.id">
                <button type="button" @click="pickForDay(dayIndex, day.id, ex)"
                        class="w-full text-left px-4 py-2.5 hover:bg-marble transition-colors"
                        style="border-bottom: 1px solid var(--al-rule-faint);">
                  <div class="flex items-center justify-between gap-3">
                    <div>
                      <p class="text-[13px] font-medium text-ink" x-text="ex.name"></p>
                      <p class="al-tag" style="font-size:9px;" x-text="ex.target"></p>
                    </div>
                    <span class="al-badge al-badge-bronze" style="font-size:9px;" x-text="ex.exercise_type"></span>
                  </div>
                </button>
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- Add day -->
    <div>
      <button @click="days.length < 20 && addDay()" :disabled="days.length >= 20" type="button"
              class="w-full py-5 flex items-center justify-center gap-2 transition-colors font-medium text-sm"
              style="border: 2px dashed var(--al-rule-strong); background: var(--al-marble); color: var(--al-ink-mute); border-radius: var(--al-r-sm);"
              :class="days.length < 20 ? 'hover:border-bronze hover:text-bronze cursor-pointer' : 'opacity-50 cursor-not-allowed'">
        <i class="ph ph-plus text-lg"></i>
        <span x-text="days.length < 20 ? 'Aggiungi giornata' : 'Max 20 giornate'"></span>
      </button>
    </div>
  </div>
</div>

<script src="/static/js/workout_builder.js"></script>
{% endblock %}
