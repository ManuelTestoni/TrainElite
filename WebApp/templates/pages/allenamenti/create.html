{% extends 'base.html' %}

{% block content %}
<div class="flex-1 w-full max-w-7xl mx-auto space-y-6" x-data="workoutBuilder">
    {% csrf_token %}
    
    {% if edit_mode %}
    <script>
        window.WORKOUT_DATA = {{ plan_data|safe }};
        window.WORKOUT_EDIT_URL = "{% url 'allenamenti_edit' assignment_id %}";
    </script>
    {% endif %}

    <!-- Title & Navigation -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight" x-text="editMode ? 'Modifica Programma d\'Allenamento' : 'Crea Programma d\'Allenamento'"></h1>
            <p class="text-sm text-slate-500 mt-1" x-text="editMode ? 'Aggiorna i parametri e modifica le giornate di allenamento.' : 'Definisci i parametri e componi le giornate di allenamento.'"></p>
        </div>
        <div class="flex items-center gap-3">
            <button type="button" @click="saveWorkout('DRAFT')" class="px-4 py-2 border border-slate-200 text-slate-600 bg-white text-sm font-medium rounded-lg hover:bg-slate-50 shadow-sm transition-colors">Salva Bozza</button>
            <button @click="saveWorkout" :disabled="isSaving" class="px-5 py-2 border border-transparent bg-brand text-white text-sm font-bold rounded-lg hover:bg-emerald-600 shadow-sm shadow-emerald-200 transition-colors disabled:opacity-50">
                <span x-show="!isSaving">Salva ed Assegna</span>
                <span x-show="isSaving">Salvataggio...</span>
            </button>
        </div>
    </div>

    <!-- Stepper/Tab Header -->
    <div class="flex items-center gap-2 border-b border-slate-200 pb-2">
        <button @click="step = 1" :class="step === 1 ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300'" class="pb-2 border-b-2 font-bold px-1 transition-colors">1. Informazioni Base</button>
        <span class="text-slate-300 px-2">&gt;</span>
        <button @click="step = 2" :class="step === 2 ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-slate-800 hover:border-slate-300'" class="pb-2 border-b-2 font-bold px-1 transition-colors">2. Builder Scheda</button>
    </div>

    <!-- Step 1: Informazioni -->
    <div x-show="step === 1" class="bg-white rounded-2xl p-6 md:p-8 border border-slate-200 shadow-sm">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-2">Nome Del Programma</label>
                <input type="text" x-model="title" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-accent focus:bg-white transition-all text-slate-900 font-medium" placeholder="Esempio: Ipertrofia Base 4gg">
            </div>

            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-2">Descrizione/Note (Opzionale)</label>
                <textarea x-model="description" rows="3" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-accent focus:bg-white transition-all text-slate-900 font-medium" placeholder="Inserisci una descrizione o linee guida generali per la scheda..."></textarea>
            </div>

            <!-- Assegna a Cliente (Ricerca Autocomplete AJAX) -->
            <div class="col-span-1 md:col-span-2">
                <label class="block text-sm font-bold text-slate-700 mb-2">Assegna al Cliente</label>
                
                <!-- Cliente Selezionato -->
                <div x-show="selectedClient" class="flex items-center justify-between bg-blue-50 border border-accent rounded-xl p-3">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded-full bg-brand text-white flex items-center justify-center font-bold text-xs"><i class="ph ph-user"></i></div>
                        <span class="ml-3 font-semibold text-slate-900" x-text="selectedClient ? selectedClient.name : ''"></span>
                    </div>
                    <button @click="clearClient" class="text-slate-400 hover:text-red-500 transition-colors p-1"><i class="ph ph-x"></i></button>
                </div>
                
                <!-- Input Ricerca -->
                <div x-show="!selectedClient" class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-magnifying-glass text-slate-400"></i>
                    </div>
                    <input type="text" x-model="clientSearchQuery" @input.debounce.300ms="searchClients" class="w-full pl-10 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-accent focus:bg-white transition-all text-slate-900 font-medium" placeholder="Cerca per nome o cognome...">
                    
                    <!-- Risultati Ricerca Dropdown -->
                    <div x-show="clientSearchResults.length > 0" @click.away="clientSearchResults = []" class="absolute z-10 w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-60 overflow-auto">
                        <template x-for="client in clientSearchResults" :key="client.id">
                            <div @click="selectClient(client)" class="px-4 py-3 hover:bg-slate-50 cursor-pointer border-b border-slate-50 last:border-0 flex items-center transition-colors">
                                <span class="font-medium text-slate-800" x-text="client.name"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Obiettivo Principale</label>
                <select x-model="goal" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-accent focus:bg-white transition-all text-slate-900 font-medium">
                    <option>Ipertrofia</option>
                    <option>Ricondizionamento</option>
                    <option>Forza</option>
                    <option>Dimagrimento</option>
                    <option>Endurance</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Livello Atleta</label>
                <select x-model="level" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-accent focus:bg-white transition-all text-slate-900 font-medium">
                    <option>Principiante</option>
                    <option>Intermedio</option>
                    <option>Avanzato</option>
                </select>
            </div>
            
            <div class="col-span-1 md:col-span-2 pt-6 border-t border-slate-100 flex justify-end">
                <button @click="step = 2" class="px-6 py-2.5 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-colors flex items-center shadow-sm">
                    Procedi al Builder <i class="ph ph-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Step 2: Builder Area -->
    <div x-show="step === 2" class="flex flex-col lg:flex-row gap-6 items-start">
        <!-- Sidebar Esercizi -->
        <div class="w-full lg:w-1/4 flex flex-col gap-4 sticky top-6">
            <div class="bg-white rounded-2xl p-5 border border-slate-200 shadow-sm h-[80vh] flex flex-col">
                <h3 class="font-bold text-slate-900 mb-4 flex items-center"><i class="ph ph-barbell text-accent mr-2 text-xl"></i> Cerca Esercizio</h3>
                <div class="relative mb-4">
                    <i class="ph ph-magnifying-glass absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" x-model="exerciseSearchQuery" @input.debounce.300ms="searchExercises" placeholder="Nome esercizio..." class="w-full pl-9 pr-3 py-2 border border-slate-200 rounded-lg text-sm bg-slate-50 focus:ring-accent">
                </div>
                
                <div class="flex-1 overflow-y-auto space-y-2 pr-2">
                    <template x-for="ex in exerciseSearchResults" :key="ex.id">
                        <div class="p-3 bg-white border border-slate-200 rounded-lg cursor-pointer hover:border-accent hover:shadow-sm transition-all group flex justify-between items-center" title="Clicca per aggiungere alla scheda">
                            <div>
                                <p class="font-bold text-sm text-slate-800 group-hover:text-accent" x-text="ex.name"></p>
                                <p class="text-xs text-slate-400" x-text="ex.target"></p>
                            </div>
                            <button type="button" @click.prevent="clickToAdd(ex)" class="w-6 h-6 rounded-full bg-slate-50 text-slate-400 group-hover:bg-brand group-hover:text-white flex items-center justify-center"><i class="ph ph-plus"></i></button>
                        </div>
                    </template>
                    <div x-show="exerciseSearchResults.length === 0" class="text-center py-6 text-slate-400 text-sm">
                        Nessun esercizio trovato ai criteri.
                    </div>
                </div>
            </div>
        </div>

        <!-- Builder Giorni -->
        <div class="w-full lg:w-3/4 flex flex-col gap-6">
            <!-- Loop sui Giorni Creati -->
            <template x-for="(day, dayIndex) in days" :key="day.id">
                <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                    <!-- Toolbar Builder Giorno -->
                    <div class="bg-slate-50/50 p-4 border-b border-slate-200 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <input type="text" x-model="day.name" class="font-bold text-slate-900 text-lg bg-transparent border-none focus:ring-0 p-0" placeholder="Nome Giornata">
                            <i class="ph ph-pencil-simple text-slate-400 text-sm"></i>
                        </div>
                        <button @click="removeDay(dayIndex)" class="text-red-500 hover:text-red-700 text-sm font-medium p-2"><i class="ph ph-trash font-bold"></i></button>
                    </div>

                    <!-- Lista Esercizi nel Giorno -->
                    <div class="p-5 space-y-3">
                        <template x-for="(ex, exIndex) in day.exercises" :key="exIndex">
                            <!-- Riga Esercizio -->
                            <div class="border border-slate-200 rounded-xl bg-white p-3 flex flex-col sm:flex-row items-start sm:items-center gap-4 shadow-sm border-l-4 border-l-brand">
                                <div class="flex-1 min-w-[200px]">
                                    <p class="font-bold text-slate-900 text-sm uppercase tracking-wide" x-text="ex.name"></p>
                                    <p class="text-[10px] text-slate-400 uppercase" x-text="ex.target"></p>
                                </div>
                                <div class="flex gap-2 w-full sm:w-auto">
                                    <div>
                                        <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1">Sets</label>
                                        <input type="text" x-model="ex.sets" class="w-14 px-2 py-1.5 bg-slate-50 border border-slate-200 text-sm font-bold text-center rounded-md focus:ring-1 focus:ring-accent focus:bg-white outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1">Reps</label>
                                        <input type="text" x-model="ex.reps" class="w-16 px-2 py-1.5 bg-slate-50 border border-slate-200 text-sm font-bold text-center rounded-md focus:ring-1 focus:ring-accent focus:bg-white outline-none">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1">Recupero</label>
                                        <input type="text" x-model="ex.rest" class="w-16 px-2 py-1.5 bg-slate-50 border border-slate-200 text-sm font-bold text-center rounded-md focus:ring-1 focus:ring-accent focus:bg-white outline-none">
                                    </div>
                                </div>
                                <div class="w-full sm:w-auto flex-1">
                                    <label class="block text-[10px] text-slate-400 font-bold uppercase mb-1 hidden sm:block">&nbsp;</label>
                                    <input type="text" x-model="ex.notes" placeholder="Note esecuzione..." class="w-full px-3 py-1.5 bg-slate-50 border border-slate-200 text-sm rounded-md focus:ring-1 focus:ring-accent focus:bg-white outline-none">
                                </div>
                                <button @click="removeExercise(dayIndex, exIndex)" class="text-slate-400 hover:text-red-500 p-2"><i class="ph ph-x"></i></button>
                            </div>
                        </template>

                        <!-- Empty State per il GIorno -->
                        <div x-show="day.exercises.length === 0" class="border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 p-6 text-center text-sm text-slate-500 flex flex-col items-center justify-center">
                            <i class="ph ph-arrow-left text-2xl mb-2 text-slate-400 animate-pulse"></i>
                            Cerca un esercizio a sinistra e clicca "+" per aggiungerlo qui
                        </div>
                    </div>
                </div>
            </template>

            <!-- Add Day Button -->
            <button @click="addDay" class="w-full border-2 border-dashed border-slate-300 rounded-2xl bg-white p-4 text-center cursor-pointer hover:bg-slate-50 hover:border-brand hover:text-brand transition-all font-bold text-sm text-slate-500 flex items-center justify-center shadow-sm">
                <i class="ph ph-plus-circle text-xl mr-2"></i> Aggiungi un'altra Giornata
            </button>
        </div>
    </div>
</div>

<script src="/static/js/workout_builder.js"></script>

{% endblock %}
