{% extends 'base.html' %}

{% block content %}
{% if edit_mode %}
<script>
window.WORKOUT_DATA = {{ plan_data|safe }};
window.WORKOUT_EDIT_URL = "{% url 'allenamenti_edit' assignment_id %}";
</script>
{% endif %}

<div class="w-full max-w-3xl mx-auto"
     x-data="workoutBuilder">

  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <a href="{% url 'allenamenti_list' %}"
         class="p-2 rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors text-slate-600">
        <i class="ph ph-arrow-left text-lg"></i>
      </a>
      <div>
        <h1 class="text-2xl font-bold text-slate-900"
            x-text="editMode ? 'Modifica Scheda' : 'Nuova Scheda Allenamento'"></h1>
        <p class="text-sm text-slate-500 mt-0.5">Componi le giornate e aggiungi esercizi.</p>
      </div>
    </div>
    <button @click="saveWorkout()" :disabled="isSaving"
            class="inline-flex items-center gap-2 bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-colors disabled:opacity-50">
      <i class="ph ph-floppy-disk text-lg"></i>
      <span x-show="!isSaving">Salva</span>
      <span x-show="isSaving">Salvataggio...</span>
    </button>
  </div>

  <div class="space-y-5">

    <!-- Info base -->
    <div class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
      <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Informazioni scheda</h2>

      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Titolo *</label>
        <input type="text" x-model="title" placeholder="Es. Ipertrofia Base 4gg"
               class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-accent focus:outline-none">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Descrizione / Note</label>
        <textarea x-model="description" rows="2" placeholder="Linee guida generali..."
                  class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-accent focus:outline-none resize-none"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Obiettivo</label>
          <select x-model="goal"
                  class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-accent focus:outline-none">
            <option>Ipertrofia</option>
            <option>Forza</option>
            <option>Dimagrimento</option>
            <option>Ricondizionamento</option>
            <option>Endurance</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1.5">Livello atleta</label>
          <select x-model="level"
                  class="w-full px-3 py-2.5 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:ring-2 focus:ring-accent focus:outline-none">
            <option>Principiante</option>
            <option>Intermedio</option>
            <option>Avanzato</option>
          </select>
        </div>
      </div>

      <!-- Client search -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 mb-1.5">Assegna al cliente *</label>

        <!-- Selected -->
        <div x-show="selectedClient"
             class="flex items-center justify-between px-3 py-2.5 bg-accent/5 border border-accent/30 rounded-xl">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-accent/20 text-accent flex items-center justify-center text-xs font-bold">
              <i class="ph ph-user"></i>
            </div>
            <span class="text-sm font-semibold text-slate-900" x-text="selectedClient ? selectedClient.name : ''"></span>
          </div>
          <button @click="clearClient()"
                  class="p-1 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-400 transition-colors">
            <i class="ph ph-x text-sm"></i>
          </button>
        </div>

        <!-- Search input -->
        <div x-show="!selectedClient" class="relative">
          <div class="flex items-center gap-2 px-3 py-2.5 border border-dashed border-slate-300 rounded-xl hover:border-accent focus-within:border-accent transition-colors bg-slate-50">
            <i class="ph ph-magnifying-glass text-slate-400 text-sm"></i>
            <input type="text" x-model="clientSearchQuery" @input.debounce.300ms="searchClients()"
                   placeholder="Cerca cliente per nome..."
                   class="flex-1 bg-transparent text-sm text-slate-700 placeholder-slate-400 focus:outline-none">
          </div>
          <div x-show="clientSearchResults.length > 0" @click.outside="clientSearchResults = []"
               class="absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-20 max-h-48 overflow-y-auto">
            <template x-for="c in clientSearchResults" :key="c.id">
              <button type="button" @click="selectClient(c)"
                      class="w-full text-left px-4 py-2.5 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0 text-sm font-medium text-slate-800"
                      x-text="c.name"></button>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- Days -->
    <template x-for="(day, dayIndex) in days" :key="day.id">
      <div class="bg-white border border-slate-200 rounded-2xl shadow-sm">

        <!-- Day header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100 bg-slate-50">
          <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-lg bg-slate-900/10 text-slate-700 flex items-center justify-center text-xs font-bold"
                 x-text="dayIndex + 1"></div>
            <input type="text" x-model="day.name" placeholder="Nome giornata"
                   class="bg-transparent text-sm font-bold text-slate-900 focus:outline-none placeholder-slate-400 border-none">
          </div>
          <button @click="removeDay(dayIndex)"
                  class="p-1.5 rounded-lg hover:bg-red-50 text-slate-400 hover:text-red-400 transition-colors">
            <i class="ph ph-trash text-sm"></i>
          </button>
        </div>

        <!-- Exercise rows -->
        <div class="divide-y divide-slate-50">
          <template x-for="(ex, exIndex) in day.exercises" :key="exIndex">
            <div class="px-5 py-3 space-y-2">
              <!-- Name + remove -->
              <div class="flex items-start justify-between gap-2">
                <div class="min-w-0">
                  <p class="text-sm font-semibold text-slate-800" x-text="ex.name"></p>
                  <p class="text-xs text-slate-400" x-text="ex.target"></p>
                </div>
                <button @click="removeExercise(dayIndex, exIndex)"
                        class="p-1 rounded-lg hover:bg-red-50 text-slate-300 hover:text-red-400 transition-colors shrink-0">
                  <i class="ph ph-x text-xs"></i>
                </button>
              </div>
              <!-- Params row -->
              <div class="flex flex-wrap items-end gap-2">
                <div class="text-center">
                  <p class="text-[10px] text-slate-400 font-semibold uppercase mb-0.5">Set</p>
                  <input type="text" x-model="ex.sets"
                         class="w-12 px-2 py-1 border border-slate-200 rounded-lg text-sm text-center focus:ring-2 focus:ring-accent focus:outline-none bg-slate-50">
                </div>
                <div class="text-center">
                  <p class="text-[10px] text-slate-400 font-semibold uppercase mb-0.5">Reps</p>
                  <input type="text" x-model="ex.reps"
                         class="w-16 px-2 py-1 border border-slate-200 rounded-lg text-sm text-center focus:ring-2 focus:ring-accent focus:outline-none bg-slate-50">
                </div>
                <div class="text-center">
                  <p class="text-[10px] text-slate-400 font-semibold uppercase mb-0.5">Rec.</p>
                  <input type="text" x-model="ex.rest"
                         class="w-16 px-2 py-1 border border-slate-200 rounded-lg text-sm text-center focus:ring-2 focus:ring-accent focus:outline-none bg-slate-50">
                </div>
                <div class="text-center flex-1 min-w-[120px]">
                  <p class="text-[10px] text-slate-400 font-semibold uppercase mb-0.5">Note esecuzione</p>
                  <input type="text" x-model="ex.notes" placeholder="Es. presa larga, ROM completo..."
                         class="w-full px-2 py-1 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-accent focus:outline-none bg-slate-50">
                </div>
              </div>
            </div>
          </template>

          <div x-show="day.exercises.length === 0"
               class="px-5 py-8 text-center text-sm text-slate-400">
            Nessun esercizio aggiunto. Cercane uno qui sotto.
          </div>
        </div>

        <!-- Exercise search per day -->
        <div class="px-5 py-4 border-t border-slate-100">
          <div class="relative">
            <div class="flex items-center gap-2 px-3 py-2 border border-dashed border-slate-300 rounded-xl hover:border-accent focus-within:border-accent transition-colors bg-slate-50">
              <i class="ph ph-magnifying-glass text-slate-400 text-sm"></i>
              <input type="text"
                     x-model="daySearch[day.id].q"
                     @input.debounce.300ms="searchForDay(day.id, daySearch[day.id].q)"
                     placeholder="Cerca esercizio da aggiungere..."
                     class="flex-1 bg-transparent text-sm text-slate-700 placeholder-slate-400 focus:outline-none">
              <span x-show="daySearch[day.id].searching" class="text-xs text-slate-400">...</span>
            </div>
            <div x-show="daySearch[day.id].show && daySearch[day.id].results.length > 0"
                 @click.outside="closeDaySearch(day.id)"
                 class="absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-20 max-h-52 overflow-y-auto">
              <template x-for="ex in daySearch[day.id].results" :key="ex.id">
                <button type="button" @click="pickForDay(dayIndex, day.id, ex)"
                        class="w-full text-left px-4 py-2.5 hover:bg-slate-50 transition-colors border-b border-slate-50 last:border-0">
                  <div class="flex items-center justify-between gap-3">
                    <div>
                      <p class="text-sm font-medium text-slate-800" x-text="ex.name"></p>
                      <p class="text-xs text-slate-400" x-text="ex.target"></p>
                    </div>
                    <span class="text-xs font-semibold text-slate-400 shrink-0" x-text="ex.exercise_type"></span>
                  </div>
                </button>
              </template>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- Add day (max 7) -->
    <div>
      <button @click="days.length < 7 && addDay()" :disabled="days.length >= 7"
              class="w-full border-2 border-dashed rounded-2xl py-5 flex items-center justify-center gap-2 transition-colors text-sm font-semibold bg-white"
              :class="days.length < 7 ? 'border-slate-300 text-slate-500 hover:border-accent hover:text-accent hover:bg-accent/5 cursor-pointer' : 'border-slate-200 text-slate-300 cursor-not-allowed'">
        <i class="ph ph-plus text-lg"></i>
        <span x-text="days.length < 7 ? 'Aggiungi giornata' : 'Massimo 7 giornate raggiunto'"></span>
      </button>
    </div>

  </div>
</div>

<script src="/static/js/workout_builder.js"></script>
{% endblock %}
